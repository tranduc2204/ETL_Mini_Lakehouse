services:
  postgres:
    image: postgres:15
    container_name: airflow-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  airflow-init:
    build: .
    container_name: airflow-init
    user: "${AIRFLOW_UID}:0"
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    entrypoint: /bin/bash
    command: >
      -c "
      echo 'Waiting for PostgreSQL...' &&
      sleep 10 &&
      airflow db init &&
      airflow  db migrate &&
      airflow users create --username ${AIRFLOW_ADMIN_USER} --firstname ${AIRFLOW_ADMIN_FIRSTNAME} --lastname ${AIRFLOW_ADMIN_LASTNAME} --role Admin --email ${AIRFLOW_ADMIN_EMAIL} --password ${AIRFLOW_ADMIN_PASSWORD} &&
      echo '✅ Airflow DB initialized successfully.'"

  airflow-webserver:
    build: .
    container_name: airflow-webserver
    user: "${AIRFLOW_UID}:0"
    restart: always
    depends_on:
      - airflow-init
      - airflow-scheduler
      - postgres
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      # LocalExecutor: chạy task trong subprocess riêng (song song), không block scheduler.
      # SequentialExecutor (mặc định) chạy task ngay trong process scheduler -> task Spark
      # nặng sẽ giữ chân scheduler -> mất heartbeat. Cần metadata DB là Postgres (đã có).
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # repo root nằm ở /opt/airflow trong container -> import tuyệt đối from config/utils chạy được
      PYTHONPATH: /opt/airflow
      # override localhost trong .env: trong mạng docker phải gọi theo service name.
      # load_dotenv() mặc định KHÔNG ghi đè biến đã có sẵn -> 2 dòng này thắng .env.
      POSTGRES_HOST: postgres
      MINIO_ENDPOINT: http://minio:9000
      # tách log của project ra khỏi thư mục log Airflow (/opt/airflow/logs)
      APP_LOG_DIR: /opt/airflow/app_logs
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./data:/opt/airflow/data
      # các thứ scripts cần nhưng trước đây chưa mount:
      - ./config:/opt/airflow/config
      - ./utils:/opt/airflow/utils
      - ./jars:/opt/airflow/jars
      - ./.env:/opt/airflow/.env
      # log riêng của project (logger trong utils/logger.py)
      - ./app_logs:/opt/airflow/app_logs
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    build: .
    container_name: airflow-scheduler
    user: "${AIRFLOW_UID}:0"
    restart: always
    depends_on:
      - airflow-init
      - postgres
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PYTHONPATH: /opt/airflow
      POSTGRES_HOST: postgres
      MINIO_ENDPOINT: http://minio:9000
      APP_LOG_DIR: /opt/airflow/app_logs
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./data:/opt/airflow/data
      - ./config:/opt/airflow/config
      - ./utils:/opt/airflow/utils
      - ./jars:/opt/airflow/jars
      - ./.env:/opt/airflow/.env
      - ./app_logs:/opt/airflow/app_logs
    command: scheduler

  spark-master:
    image: apache/spark:3.5.1

    container_name: spark-master

    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master

    ports:
      - "8081:8080"
      - "7077:7077"

    volumes:
      - ./scripts:/opt/spark/scripts
      - ./data:/opt/spark/data  
  spark-worker:
    image: apache/spark:3.5.1

    container_name: spark-worker

    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077

    depends_on:
      - spark-master

    volumes:
      - ./scripts:/opt/spark/scripts
      - ./data:/opt/spark/data
    
  minio:
    image: minio/minio

    container_name: minio

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: ${MINIO_ADMIN}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}  

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      # - minio_data:/data
      - ./minio_data:/data
      

volumes:
  postgres_data:
  minio_data: